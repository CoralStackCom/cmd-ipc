name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build && yarn workspace @examples/electron-core build

      - name: Type checks
        run: yarn typecheck:all

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn prettify --check

      - name: Run tests
        run: yarn test:run
