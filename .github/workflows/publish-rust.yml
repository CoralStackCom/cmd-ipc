name: Publish Rust (crates.io)

on:
  push:
    tags:
      - 'rust-v*' # Rust releases (e.g. rust-v1.0.0)
  workflow_dispatch:

defaults:
  run:
    working-directory: rust

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

      # Publish order matches dependency graph:
      #   cmd-ipc-macros  →  cmd-ipc  →  cmd-ipc-mcp
      # `cargo publish` blocks until the crate is queryable on the index,
      # so dependents can resolve the freshly-published version immediately.
      - name: Publish coralstack-cmd-ipc-macros
        run: cargo publish -p coralstack-cmd-ipc-macros

      - name: Publish coralstack-cmd-ipc
        run: cargo publish -p coralstack-cmd-ipc

      - name: Publish coralstack-cmd-ipc-mcp
        run: cargo publish -p coralstack-cmd-ipc-mcp
