name: Conformance

on:
  pull_request:
    branches:
      - main
    paths:
      - 'spec/**'
      - 'ts/**'
      - 'rust/**'
      - '.github/workflows/conformance.yml'

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: TS install
        run: cd ts && yarn install --immutable

      - name: Run conformance (TS + Rust)
        run: make conformance
